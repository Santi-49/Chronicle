name: Release desktop

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      tag: ${{ steps.release.outputs['apps/desktop--tag_name'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  attach-windows-installer:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - run: python -m pip install -e "services/ai[google,bundle]"
      - run: npm ci
        working-directory: apps/desktop
      - name: Verify release version
        shell: pwsh
        env:
          CHRONICLE_RELEASE_TAG: ${{ needs.release-please.outputs.tag }}
        run: python scripts/check_versions.py
      - run: npm run package
        working-directory: apps/desktop
      - run: python scripts/smoke_ai_sidecar.py
      - name: Write installer checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/Chronicle-Setup-*.exe -File
          if ($installer.Count -ne 1) { throw "Expected exactly one installer" }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content apps/desktop/dist/SHA256SUMS.txt
      - name: Attach installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag }}" apps/desktop/dist/Chronicle-Setup-*.exe apps/desktop/dist/SHA256SUMS.txt --clobber
