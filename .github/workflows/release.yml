name: Release desktop

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.release.outputs['apps/desktop--release_created'] }}
      tag: ${{ steps.release.outputs['apps/desktop--tag_name'] }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  attach-windows-installer:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    runs-on: windows-latest
    env:
      CHRONICLE_CONTROL_PLANE_URL: ${{ vars.CHRONICLE_CONTROL_PLANE_URL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - run: npm ci
        working-directory: apps/desktop
      - name: Verify release version
        shell: pwsh
        env:
          CHRONICLE_RELEASE_TAG: ${{ needs.release-please.outputs.tag }}
        run: python scripts/check_versions.py
      - name: Verify public desktop configuration
        shell: pwsh
        run: |
          if (-not $env:CHRONICLE_CONTROL_PLANE_URL) { throw "Missing repository variable CHRONICLE_CONTROL_PLANE_URL" }
          if (-not $env:GOOGLE_OAUTH_CLIENT_ID) { throw "Missing repository variable GOOGLE_OAUTH_CLIENT_ID" }
          if (-not $env:GOOGLE_OAUTH_CLIENT_SECRET) { throw "Missing repository secret GOOGLE_OAUTH_CLIENT_SECRET" }
      - run: npm run package
        working-directory: apps/desktop
      - run: python scripts/smoke_ai_sidecar.py
      - name: Write installer checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/Chronicle-Setup-*.exe -File
          if ($installer.Count -ne 1) { throw "Expected exactly one installer" }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content apps/desktop/dist/SHA256SUMS-windows.txt
      - name: Attach installer to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag }}" apps/desktop/dist/Chronicle-Setup-*.exe apps/desktop/dist/SHA256SUMS-windows.txt --clobber

  attach-macos-installer:
    needs: release-please
    if: needs.release-please.outputs.created == 'true'
    # Pin the standard Apple Silicon runner so the native sidecar architecture is deterministic.
    runs-on: macos-15
    env:
      CHRONICLE_CONTROL_PLANE_URL: ${{ vars.CHRONICLE_CONTROL_PLANE_URL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - run: npm ci
        working-directory: apps/desktop
      - name: Verify release version
        env:
          CHRONICLE_RELEASE_TAG: ${{ needs.release-please.outputs.tag }}
        run: python scripts/check_versions.py
      - name: Verify public desktop configuration
        run: |
          test -n "$CHRONICLE_CONTROL_PLANE_URL" || { echo "Missing repository variable CHRONICLE_CONTROL_PLANE_URL" >&2; exit 1; }
          test -n "$GOOGLE_OAUTH_CLIENT_ID" || { echo "Missing repository variable GOOGLE_OAUTH_CLIENT_ID" >&2; exit 1; }
          test -n "$GOOGLE_OAUTH_CLIENT_SECRET" || { echo "Missing repository secret GOOGLE_OAUTH_CLIENT_SECRET" >&2; exit 1; }
      - run: npm run package:mac
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: python scripts/smoke_ai_sidecar.py
      - name: Write installer checksum
        shell: bash
        run: |
          installers=(apps/desktop/dist/Chronicle-*-mac-*.dmg)
          if [[ ${#installers[@]} -ne 1 || ! -f "${installers[0]}" ]]; then
            echo "Expected exactly one macOS DMG" >&2
            exit 1
          fi
          shasum -a 256 "${installers[0]}" > apps/desktop/dist/SHA256SUMS-macos.txt
      - name: Attach installer to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag }}" apps/desktop/dist/Chronicle-*-mac-*.dmg apps/desktop/dist/SHA256SUMS-macos.txt --clobber
