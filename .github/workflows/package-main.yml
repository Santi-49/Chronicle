name: Package desktop snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: package-main
  cancel-in-progress: true

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest
    env:
      CHRONICLE_CONTROL_PLANE_URL: ${{ vars.CHRONICLE_CONTROL_PLANE_URL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - run: npm ci
        working-directory: apps/desktop
      - run: python scripts/check_versions.py
      - run: npm run package
        working-directory: apps/desktop
      - run: python scripts/smoke_ai_sidecar.py
      - name: Write installer checksum
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/dist/Chronicle-Setup-*.exe -File
          if ($installer.Count -ne 1) { throw "Expected exactly one installer" }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content apps/desktop/dist/SHA256SUMS-windows.txt
      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $appVersion = node -p "require('./apps/desktop/package.json').version"
          "app_version=$appVersion" >> $env:GITHUB_OUTPUT
      - uses: actions/upload-artifact@v4
        with:
          name: Chronicle-${{ steps.version.outputs.app_version }}-windows-${{ github.sha }}
          path: |
            apps/desktop/dist/Chronicle-Setup-*.exe
            apps/desktop/dist/SHA256SUMS-windows.txt
          if-no-files-found: error
          retention-days: 30

  macos-installer:
    name: macOS installer
    # Pin the standard Apple Silicon runner so the native sidecar architecture is deterministic.
    runs-on: macos-15
    env:
      CHRONICLE_CONTROL_PLANE_URL: ${{ vars.CHRONICLE_CONTROL_PLANE_URL }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai/pyproject.toml
      - run: npm ci
        working-directory: apps/desktop
      - run: python scripts/check_versions.py
      - run: npm run package:mac
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - run: python scripts/smoke_ai_sidecar.py
      - name: Write installer checksum
        shell: bash
        run: |
          installers=(apps/desktop/dist/Chronicle-*-mac-*.dmg)
          if [[ ${#installers[@]} -ne 1 || ! -f "${installers[0]}" ]]; then
            echo "Expected exactly one macOS DMG" >&2
            exit 1
          fi
          shasum -a 256 "${installers[0]}" > apps/desktop/dist/SHA256SUMS-macos.txt
      - name: Read app version
        id: version
        run: echo "app_version=$(node -p \"require('./apps/desktop/package.json').version\")" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: Chronicle-${{ steps.version.outputs.app_version }}-macos-${{ github.sha }}
          path: |
            apps/desktop/dist/Chronicle-*-mac-*.dmg
            apps/desktop/dist/SHA256SUMS-macos.txt
          if-no-files-found: error
          retention-days: 30
